<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stilisierte S-Bahn am Bahnsteig in der Abenddämmerung">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a14"/>
      <stop offset="0.5" stop-color="#1a1310"/>
      <stop offset="1" stop-color="#0d0b09"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d42a22" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d42a22" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="train" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33291f"/>
      <stop offset="1" stop-color="#1d1712"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffc400" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffc400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Himmel -->
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <!-- warmer Lichtschein oben rechts -->
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- ferne Stadt-/Stern-Lichter -->
  <g fill="#ffc400" opacity="0.5">
    <circle cx="1180" cy="170" r="3"/><circle cx="1255" cy="120" r="2"/><circle cx="1330" cy="200" r="3"/>
    <circle cx="1420" cy="150" r="2"/><circle cx="980" cy="140" r="2"/><circle cx="1500" cy="240" r="3"/>
  </g>
  <g fill="#e9e2d8" opacity="0.25">
    <rect x="980" y="250" width="60" height="180"/><rect x="1060" y="210" width="48" height="220"/>
    <rect x="1130" y="280" width="70" height="150"/><rect x="1450" y="240" width="54" height="190"/>
  </g>
  <g fill="#ffc400" opacity="0.45">
    <rect x="992" y="280" width="10" height="12"/><rect x="1016" y="320" width="10" height="12"/>
    <rect x="1072" y="250" width="10" height="12"/><rect x="1146" y="300" width="10" height="12"/>
    <rect x="1462" y="280" width="10" height="12"/><rect x="1480" y="330" width="10" height="12"/>
  </g>

  <!-- riesiges S-Bahn-Symbol (dezenter Akzent) -->
  <g opacity="0.10" transform="translate(1080 460)">
    <circle cx="170" cy="170" r="170" fill="none" stroke="#ffc400" stroke-width="22"/>
    <path d="M232 96c-30-26-104-30-120 6-14 30 18 46 56 58s70 28 56 58c-16 36-92 30-122 4"
          fill="none" stroke="#ffc400" stroke-width="34" stroke-linecap="round"/>
  </g>

  <!-- Bahnsteigkante + Boden -->
  <rect x="0" y="760" width="1600" height="240" fill="#15100c"/>
  <rect x="0" y="760" width="1600" height="8" fill="#ffc400" opacity="0.8"/>
  <rect x="0" y="772" width="1600" height="3" fill="#ffc400" opacity="0.3"/>

  <!-- perspektivische Gleise -->
  <g stroke="#3a3128" stroke-width="4" opacity="0.7">
    <path d="M120 1000 L640 770"/><path d="M520 1000 L760 770"/>
    <path d="M920 1000 L880 770"/><path d="M1320 1000 L1000 770"/>
  </g>
  <g stroke="#2a231b" stroke-width="6" opacity="0.6">
    <path d="M180 980 L1180 980"/><path d="M300 900 L1080 900"/><path d="M420 840 L1000 840"/>
  </g>

  <!-- S-Bahn-Waggon (Seitenansicht von schräg) -->
  <g transform="translate(150 470)">
    <!-- Lichtkegel der Scheinwerfer -->
    <ellipse cx="40" cy="250" rx="180" ry="60" fill="url(#lamp)"/>
    <!-- Wagenkörper -->
    <rect x="60" y="40" width="900" height="250" rx="40" fill="url(#train)" stroke="#4a3d2e" stroke-width="3"/>
    <!-- Dach-Akzentlinie -->
    <rect x="80" y="44" width="860" height="10" rx="5" fill="#3a3128"/>
    <!-- roter Marken-Streifen -->
    <rect x="60" y="180" width="900" height="22" fill="#d42a22"/>
    <rect x="60" y="202" width="900" height="6" fill="#a81e18"/>
    <!-- Front-Schräge -->
    <path d="M60 80 Q20 90 20 160 L20 250 Q20 290 60 290 Z" fill="#1d1712" stroke="#4a3d2e" stroke-width="3"/>
    <!-- Frontscheibe -->
    <path d="M58 96 Q34 104 34 156 L34 176 L58 176 Z" fill="#2b2a33"/>
    <!-- Scheinwerfer -->
    <circle cx="44" cy="246" r="12" fill="#ffe27a"/>
    <circle cx="44" cy="246" r="20" fill="#ffc400" opacity="0.3"/>
    <!-- Fensterreihe (warm beleuchtet) -->
    <g fill="#ffc400" opacity="0.92">
      <rect x="150" y="96" width="120" height="64" rx="10"/>
      <rect x="300" y="96" width="120" height="64" rx="10"/>
      <rect x="450" y="96" width="120" height="64" rx="10"/>
      <rect x="600" y="96" width="120" height="64" rx="10"/>
      <rect x="750" y="96" width="120" height="64" rx="10"/>
    </g>
    <g fill="#1d1712" opacity="0.25">
      <rect x="150" y="120" width="120" height="6"/><rect x="300" y="120" width="120" height="6"/>
      <rect x="450" y="120" width="120" height="6"/><rect x="600" y="120" width="120" height="6"/>
      <rect x="750" y="120" width="120" height="6"/>
    </g>
    <!-- Türen -->
    <rect x="278" y="214" width="64" height="76" rx="6" fill="#0f0c0a" opacity="0.6"/>
    <rect x="578" y="214" width="64" height="76" rx="6" fill="#0f0c0a" opacity="0.6"/>
    <!-- Räder -->
    <circle cx="220" cy="300" r="30" fill="#0d0b09" stroke="#3a3128" stroke-width="6"/>
    <circle cx="320" cy="300" r="30" fill="#0d0b09" stroke="#3a3128" stroke-width="6"/>
    <circle cx="700" cy="300" r="30" fill="#0d0b09" stroke="#3a3128" stroke-width="6"/>
    <circle cx="800" cy="300" r="30" fill="#0d0b09" stroke="#3a3128" stroke-width="6"/>
  </g>

  <!-- sanfter Boden-Schatten unter der Bahn -->
  <ellipse cx="650" cy="788" rx="640" ry="26" fill="#000" opacity="0.35"/>
</svg>
